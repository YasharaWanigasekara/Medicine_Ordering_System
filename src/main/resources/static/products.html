<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products - MediCare+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .category-filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
        .category-btn { padding: 8px 18px; border: 1px solid #ddd; background: white; border-radius: 20px; cursor: pointer; }
        .category-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .product-name { font-weight: 600; }
        .product-price { font-size: 1.4rem; font-weight: 700; color: #667eea; }
        .cart-icon { position: relative; cursor: pointer; }
        .cart-count { position: absolute; top: -8px; right: -12px; background: #ef4444; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .cart-modal { display: none; position: fixed; z-index: 1050; top: 0; right: 0; bottom: 0; left: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .cart-modal.active { display: flex; }
        .cart-modal-content { background: white; border-radius: 15px; width: 90%; max-width: 600px; padding: 30px; }
        .search-section {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .search-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>MediCare+ Products</h1>
        </div>
        <div class="d-flex align-items-center gap-3">
            <div class="cart-icon" onclick="openCartModal()">
                <i class="bi bi-cart-fill fs-2" style="color: #667eea;"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>
    <div class="search-section">
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder=" Search medicines by name..." onkeypress="handleEnterKey(event)">
            <button class="btn btn-primary" onclick="searchProducts()">Search</button>
            <button class="btn btn-primary" onclick="fetchProducts()">Show All</button>
        </div>
        <div class="category-filters">
            <button class="category-btn active" onclick="filterData('All')">All</button>
            <button class="category-btn" onclick="filterData('Available')">Available Only</button>
            <button class="category-btn" onclick="filterData('Category', 'Antibiotics')">Antibiotics</button>
            <button class="category-btn" onclick="filterData('Category', 'Pain Relief')">Pain Relief</button>
            <button class="category-btn" onclick="filterData('Category', 'Vitamins')">Vitamins</button>
        </div>
    </div>

    <div class="products-grid" id="productsGrid"></div>
</div>
<div class="cart-modal" id="cartModal">
    <div class="cart-modal-content">
        <div class="d-flex justify-content-between align-items-center">
            <h4>Your Cart</h4>
            <button type="button" class="btn-close" onclick="closeCartModal()"></button>
        </div>
        <hr>
        <div id="cartItemsContainer"></div>
        <div class="mt-3">
            <div class="d-flex justify-content-between fs-5 fw-bold">
                <span>Total:</span>
                <span id="cartTotal">Rs. 0.00</span>
            </div>
            <div class="d-flex gap-2 mt-3">
                <button class="btn btn-danger w-50" onclick="clearCart()">Clear Cart</button>
                <a href="checkout.html" class="btn btn-success w-50">Checkout</a>
            </div>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/js/ProductAvailabilityCustomer.js"></script>
</body>
</html>
