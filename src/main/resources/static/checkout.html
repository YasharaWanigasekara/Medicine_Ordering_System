<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .checkout-container { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
        .checkout-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); width: 100%; max-width: 500px; }
    </style>
</head>
<body>
<div class="checkout-container">
    <div class="checkout-card">
        <h2 class="text-center mb-4" style="color: #667eea;">Secure Checkout</h2>
        <form id="paymentForm">
            <div class="mb-3">
                <label for="customerName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="customerName" required>
            </div>
            <div class="mb-3">
                <label for="amount" class="form-label">Amount (Rs.)</label>
                <input type="number" class="form-control" id="amount" required readonly>
            </div>
            <div class="mb-3">
                <label for="method" class="form-label">Payment Method</label>
                <select id="method" class="form-select" required>
                    <option value="Credit Card">Credit Card</option>
                    <option value="Debit Card">Debit Card</option>
                    <option value="Cash on Delivery">Cash on Delivery</option>
                </select>
            </div>
            <button type="submit" class="btn btn-success w-100 mt-3">Confirm Payment</button>
        </form>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function() {
        $.ajax({
            url: '/api/cart',
            method: 'GET',
            success: function(cart) {
                $('#amount').val(cart.totalPrice.toFixed(2));
            },
            error: function() {
                alert('Could not fetch cart total. Please go back to your cart.');
                $('#amount').val('0.00');
            }
        });

        $('#paymentForm').on('submit', function(e) {
            e.preventDefault();
            const paymentData = {
                customerName: $('#customerName').val(),
                amount: parseFloat($('#amount').val()),
                method: $('#method').val(),
                paymentDate: new Date().toISOString().split('T')[0] // Today's date
            };

            $.ajax({
                url: '/payments/process',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(paymentData),
                success: function(response) {
                    alert(response);
                    $.ajax({ url: '/api/cart/clear', method: 'DELETE' });
                    window.location.href = '/products.html'; // Redirect to products page
                },
                error: function(xhr) {
                    alert(`Payment failed: ${xhr.responseText}`);
                }
            });
        });
    });
</script>
</body>
</html>
