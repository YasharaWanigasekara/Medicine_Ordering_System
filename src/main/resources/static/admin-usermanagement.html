<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>User Management</h1>
            <p class="subtitle">View and manage system users</p>
        </div>
        <a href="admin-dashboard.html" class="btn btn-primary"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-light">
                <tr><th>ID</th><th>Name</th><th>Username</th><th>Email</th><th>Role</th><th>Actions</th></tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function() {
        fetchUsers();
    });

    function fetchUsers() {
        $.ajax({
            url: '/api/admin/users',
            method: 'GET',
            success: function(users) {
                const tableBody = $('#usersTableBody');
                tableBody.empty();
                users.forEach(user => {
                    const deleteButton = user.userType.toUpperCase() === 'ADMIN'
                        ? `<button class="btn btn-sm btn-danger" disabled>Delete</button>`
                        : `<button class="btn btn-sm btn-danger" onclick="deleteUser('${user.username}')">Delete</button>`;

                    tableBody.append(`
                        <tr>
                            <td>${user.id}</td>
                            <td>${user.name}</td>
                            <td>${user.username}</td>
                            <td>${user.email}</td>
                            <td><span class="badge bg-primary">${user.userType}</span></td>
                            <td>${deleteButton}</td>
                        </tr>
                    `);
                });
            }
        });
    }

    function deleteUser(username) {
        if (!confirm(`Are you sure you want to delete user: ${username}?`)) {
            return;
        }
        $.ajax({
            url: `/api/admin/users/${username}`,
            method: 'DELETE',
            success: function(response) {
                alert(response);
                fetchUsers();
            },
            error: function(xhr) {
                alert(`Error: ${xhr.responseText}`);
            }
        });
    }
</script>
</body>
</html>
