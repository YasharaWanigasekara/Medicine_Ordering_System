<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        .stat-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 20px; }
        .stat-card .icon { font-size: 3rem; color: #667eea; opacity: 0.7; }
        .stat-card .info h3 { font-size: 2.5rem; font-weight: 700; }
        .stat-card .info p { color: #666; margin: 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>Admin Dashboard</h1>
            <p class="subtitle">System Overview</p>
        </div>
        <div>
            <a href="product-admin.html" class="btn btn-primary"><i class="bi bi-box-seam-fill"></i> Manage Products</a>
            <a href="admin-usermanagement.html" class="btn btn-primary"><i class="bi bi-people-fill"></i> Manage Users</a>
            <a href="admin-expiryalerts.html" class="btn btn-warning"><i class="bi bi-hourglass-split"></i> Expiry Alerts</a>
            <a href="/logout" class="btn btn-danger"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function() {
        $.ajax({
            url: '/api/admin/dashboard/stats',
            method: 'GET',
            success: function(stats) {
                const grid = $('#statsGrid');
                grid.empty();
                grid.append(createStatCard('Total Users', stats.totalUsers, 'bi-people-fill'));
                grid.append(createStatCard('Total Products', stats.totalProducts, 'bi-box-seam-fill'));
                grid.append(createStatCard('Pending Alerts', stats.pendingAlerts, 'bi-exclamation-triangle-fill'));
            },
            error: function() { $('#statsGrid').html('<p class="text-danger">Could not load dashboard stats.</p>'); }
        });
    });
    function createStatCard(title, value, iconClass) {
        return `<div class="stat-card"><i class="bi ${iconClass} icon"></i><div class="info"><h3>${value}</h3><p>${title}</p></div></div>`;
    }
</script>
</body>
</html>
