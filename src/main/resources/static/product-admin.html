<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #667eea; font-size: 32px; }
        .header .subtitle { color: #888; font-size: 14px; margin-top: 5px; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .search-section { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .search-container { display: flex; gap: 15px; }
        .search-input { flex: 1; padding: 15px 20px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 14px; }
        .search-input:focus { outline: none; border-color: #667eea; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .product-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .product-name { font-weight: 600; }
        .product-price { font-size: 1.4rem; font-weight: 700; color: #667eea; }
        .modal { display: none; position: fixed; z-index: 1050; top: 0; left: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6); }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { background-color: #fefefe; margin: auto; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal-header-title { font-size: 24px; font-weight: 700; color: #1f2937; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 600; color: #374151; font-size: 14px; }
        .form-input, .form-select { width: 100%; padding: 12px 15px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 14px; }
        .form-input:focus, .form-select:focus { outline: none; border-color: #667eea; }
        .form-actions { display: flex; gap: 15px; margin-top: 30px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>Product Management</h1>
            <div class="subtitle">Admin & Seller Panel</div>
        </div>
        <div>
            <a href="/admin-dashboard.html" class="btn btn-primary"><i class="bi bi-arrow-left"></i> Dashboard</a>
            <button class="btn btn-success" onclick="openModal('add')"><i class="bi bi-plus-lg"></i> Add New Product</button>
        </div>
    </div>

    <div class="search-section">
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Search medicines by name..." onkeypress="handleEnterKey(event)">
            <button class="btn btn-primary" onclick="searchProducts()">Search</button>
            <button class="btn btn-secondary" onclick="fetchProducts()">Show All</button>
        </div>
    </div>

    <div class="products-grid" id="productsGrid"></div>
</div>

<div class="modal" id="productModal">
    <div class="modal-content">
        <form id="productForm" onsubmit="event.preventDefault(); saveProduct();">
            <div class="modal-header-title" id="modalTitle">Add New Product</div>
            <input type="hidden" id="productId">

            <div class="form-group">
                <label class="form-label" for="productName">Product Name</label>
                <input type="text" class="form-input" id="productName" required>
            </div>
            <div class="row">
                <div class="col-md-6 form-group">
                    <label class="form-label" for="productPrice">Price (Rs.)</label>
                    <input type="number" step="0.01" min="0.01" class="form-input" id="productPrice" required>
                </div>
                <div class="col-md-6 form-group">
                    <label class="form-label" for="productQuantity">Quantity</label>
                    <input type="number" class="form-input" id="productQuantity" min="0" step="1" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="productCategory">Category</label>
                <select class="form-select" id="productCategory" required>
                    <option value="" disabled selected>Select a category</option>
                    <option value="Antibiotics">Antibiotics</option>
                    <option value="Pain Relief">Pain Relief</option>
                    <option value="Vitamins">Vitamins</option>
                    <option value="First Aid">First Aid</option>
                    <option value="Supplements">Supplements</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="lowStockThreshold">Low Stock Threshold</label>
                <input type="number" class="form-input" id="lowStockThreshold" value="5" min="0" step="1" required>
            </div>

            <hr class="my-3">
            <h5 class="mb-3" style="font-weight: 600; color: #374151;">Expiry Information</h5>
            <div class="form-group">
                <label class="form-label" for="expiryDate">Expiry Date</label>
                <input type="date" class="form-input" id="expiryDate" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="expiryThresholdDays">Expiry Alert Threshold (Days)</label>
                <input type="number" class="form-input" id="expiryThresholdDays" value="60" min="1" step="1" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Save Product</button>
                <button type="button" class="btn btn-danger" style="flex: 1;" onclick="closeModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/js/ProductAvailabilityAdmin.js"></script>
</body>
</html>
