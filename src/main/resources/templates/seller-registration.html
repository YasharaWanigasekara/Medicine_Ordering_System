<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seller Registration - MediCare+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .registration-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
            min-height: 100vh;
        }
        .registration-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 700px;
        }
        .registration-card h2 {
            color: #667eea;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 700;
        }
        .form-control {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            font-size: 16px;
        }
        .links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="registration-container">
    <div class="registration-card">
        <h2>Seller Registration</h2>

        <!-- This block will display any error message sent from the controller -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <!-- The form is linked to the "seller" object from the controller -->
        <form th:action="@{/seller/registration}" method="post" th:object="${seller}">

            <h5 class="mb-3 text-secondary">Account Details</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" th:field="*{username}" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" th:field="*{email}" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="phoneNumber" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phoneNumber" th:field="*{phoneNumber}">
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <input type="text" class="form-control" id="address" th:field="*{address}">
            </div>

            <hr class="my-4">
            <h5 class="mb-3 text-secondary">Store Information</h5>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="storeName" class="form-label">Store Name</label>
                    <input type="text" class="form-control" id="storeName" th:field="*{storeName}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="licenseNumber" class="form-label">License Number</label>
                    <input type="text" class="form-control" id="licenseNumber" th:field="*{licenseNumber}">
                </div>
            </div>
            <div class="mb-3">
                <label for="specialization" class="form-label">Specialization (e.g., Ayurvedic, General Pharmacy)</label>
                <input type="text" class="form-control" id="specialization" th:field="*{specialization}">
            </div>
            <div class="mb-3">
                <label for="storeDescription" class="form-label">Store Description</label>
                <textarea class="form-control" id="storeDescription" rows="3" th:field="*{storeDescription}"></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-register mt-3">Register as Seller</button>
        </form>
        <div class="links">
            <p>Already have an account? <a href="/login">Login here</a></p>
        </div>
    </div>
</div>
</body>
</html>
